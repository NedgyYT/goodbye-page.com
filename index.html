<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Uninstalled</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background-color: #fafafa;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: #0066cc;
            background-color: #fff;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0052a3;
        }
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">😢</div>
    <h1>We're sorry to see you go</h1>
    <p>Thank you for trying our extension. Please let us know why you uninstalled it so we can improve the experience.</p>

    <form id="feedbackForm">
        <div class="form-group">
            <label for="reason">What was the main reason?</label>
            <select id="reason" required>
                <option value="" disabled selected>Select a reason...</option>
                <option value="broken-sites">It broke some websites (like YouTube)</option>
                <option value="too-bright">The colors were too bright/distracting</option>
                <option value="not-needed">I don't need it anymore</option>
                <option value="other">Other reason</option>
            </select>
        </div>

        <div class="form-group">
            <label for="details">Can you share more details? (Optional)</label>
            <textarea id="details" placeholder="What can we do better?"></textarea>
        </div>

        <button type="submit">Submit Feedback</button>
    </form>
    
    <p class="footer-text">Your privacy matters. No personal data is stored.</p>
</div>

<script>
    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Thank you for your feedback! Your input helps us build better tools.');
        // Optional: If you use a free form service like Formspree, you can send the data here.
    });
</script>

</body>
</html>
